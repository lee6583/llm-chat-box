[build]
  # 构建命令
  # Netlify 环境下建议通过 corepack 确保 pnpm 可用且版本与 package.json 中的 packageManager 一致
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm build"
  # 构建输出目录（Vite 默认输出到 dist）
  publish = "dist"

[functions]
  directory = "netlify/functions"

# 环境变量（如果需要，可以在 Netlify 控制台设置）
[build.environment]
  NODE_VERSION = "20"

# SPA 路由重定向规则（支持 Vue Router history 模式）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
